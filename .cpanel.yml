---
deployment:
  tasks:
    # Deploy ONLY when the checked-out branch is 'prod'
    - 'BRANCH="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")"; if [ "$BRANCH" != "prod" ]; then echo "[cpanel] Skip deploy (branch=$BRANCH)"; exit 0; fi'

    # Destination directory (document root)
    - 'DEPLOY_DIR="${HOME}/public_html"; mkdir -p "$DEPLOY_DIR"'

    # Sync public/ into document root, excluding server-side config.php
    - 'if command -v rsync >/dev/null 2>&1; then rsync -az --delete --exclude "includes/config.php" public/ "$DEPLOY_DIR"/; else /bin/cp -Rfp public/* "$DEPLOY_DIR"/; fi'

    - 'echo "[cpanel] Deployed public/ to $DEPLOY_DIR (branch=$BRANCH)"'
